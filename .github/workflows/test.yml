name: Test

on:
  workflow_call:

jobs:
  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up the environment
        uses: ./.github/actions/setup-uv-env
      - name: Run ruff check
        run: uv run ruff check .
      - name: Run ruff format check
        run: uv run ruff format . --check

